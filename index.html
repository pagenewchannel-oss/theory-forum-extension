<div class="extension_settings" id="tf_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
                <b>Theory Forum</b>
                <div class="inline-drawer-icon fa-solid fa-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
                <div class="setup_item">
                        <label class="checkbox_label">
                                <input id="tf-enabled" type="checkbox"/>
                                <span>Автогенерация</span>
                        </label>
                        <label style="display:flex;align-items:center;gap:8px;margin-top:5px;">
                                <span>Каждые N сообщений:</span>
                                <input id="tf-frequency" type="number" min="1" max="200" class="text_pole" style="width:60px;"/>
                        </label>
                        <label style="margin-top:5px;display:block;">
                                <span>Стиль (промпт):</span>
                                <textarea id="tf-style-prompt" class="text_pole" rows="3" style="width:100%;margin-top:4px;"></textarea>
                        </label>
                        <div style="display:flex;gap:6px;margin-top:10px;">
                                <button id="tf-toggle" class="menu_button">👁 Показать/Скрыть</button>
                                <button id="tf-gen" class="menu_button">⚡ Сгенерировать</button>
                        </div>
                </div>
        </div>
    </div>
</div>
